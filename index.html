<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/sidebar.css">
</head>
<body>

    <button id="toggle-sidebar-btn" aria-label="Menu Lateral">☰</button>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>TaskFlow</h2>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-btn" data-filter-category="todas">Todas as Tarefas</button>
        </nav>

        <hr class="sidebar-divider">

        <div class="sidebar-categories">
            <h3>Categorias</h3>
            <nav class="sidebar-nav">
                <button class="nav-btn" data-filter-category="estudos">Estudos</button>
                <button class="nav-btn" data-filter-category="trabalho">Trabalho</button>
                <button class="nav-btn" data-filter-category="pessoal">Pessoal</button>
                <button class="nav-btn" data-filter-category="compras">Compras</button>
                <button class="nav-btn" data-filter-category="outras">Outros</button>
            </nav>
        </div>
    </aside>

    <main class="todo-container">
        <h1>Minha Lista de Tarefas</h1>

            <section class="input-container">
                <input
                    type="text"
                    id="task-input"
                    placeholder="Digite uma nova tarefa..."
                    aria-label="Nova tarefa"
                >

                <textarea
                    id="task-description"
                    placeholder="Descrição da tarefa"
                ></textarea>

                <select id="task-category">
                    <option value="Estudos">Estudos</option>
                    <option value="Trabalho">Trabalho</option>
                    <option value="Pessoal">Pessoal</option>
                    <option value="Compras">Compras</option>
                    <option value="Outros">Outros</option>
                </select>

                <select id="task-priority">
                    <option value="Baixa">Baixa</option>
                    <option value="Média">Média</option>
                    <option value="Alta">Alta</option>
                </select>

                <button id="add-task-btn">Adicionar</button>
            </section>
            
            <section class="task-list-container">
                <ul id="task-list"></ul>
            </section>

            <dialog id="edit-modal">
                <div class="modal-content">
                    <h2>Editar Tarefa</h2>
                    <input type="text" id="edit-task-input" placeholder="Tarefa">
                    <textarea id="edit-task-description" placeholder="Descrição"></textarea>

                    <select id="edit-task-category">
                        <option value="Estudos">Estudos</option>
                        <option value="Trabalho">Trabalho</option>
                        <option value="Pessoal">Pessoal</option>
                        <option value="Compras">Compras</option>
                        <option value="Outros">Outros</option>
                    </select>

                    <select id="edit-task-priority">
                        <option value="Baixa">Baixa</option>
                        <option value="Média">Média</option>
                        <option value="Alta">Alta</option>
                    </select>

                    <div class="modal-actions">
                        <button id="save-edit-btn">Salvar Alterações</button>
                        <button id="close-modal-btn">Cancelar</button>
                    </div>
                </div>
            </dialog>
            
            <script type="module" src="./js/app.js"></script>
    </main>
    
</body>
</html>
